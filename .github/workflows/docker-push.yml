name: Pull and Push Docker Image

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Balrog image tag to pull from Docker Hub"
        required: true
        type: string

jobs:
  push:
    environment: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      IMAGE_TAG: ${{ github.event.inputs.image_tag }}
      GAR_LOCATION: ${{ vars.GAR_LOCATION }}
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      GAR_REPOSITORY: ${{ vars.GAR_REPOSITORY }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - id: gcp-auth
        name: Google authentication
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          token_format: "access_token"
          service_account: artifact-writer@${{ vars.GCP_PROJECT_ID }}.iam.gserviceaccount.com
          workload_identity_provider: ${{ vars.GCPV2_GITHUB_WORKLOAD_IDENTITY_PROVIDER }}

      - name: Pull agent image
        run: docker pull mozilla/balrogagent:${IMAGE_TAG}

      - name: Pull app image
        run: docker pull mozilla/balrog:${IMAGE_TAG}

      - name: Log in to GAR for push
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ vars.GAR_LOCATION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.gcp-auth.outputs.access_token }}

      - name: Tag agent image
        run: docker tag mozilla/balrogagent:${IMAGE_TAG} ${GAR_LOCATION}-docker.pkg.dev/${GCP_PROJECT_ID}/${GAR_REPOSITORY}/balrogagent:${IMAGE_TAG}

      - name: Push agent image
        run: docker push ${GAR_LOCATION}-docker.pkg.dev/${GCP_PROJECT_ID}/${GAR_REPOSITORY}/balrogagent:${IMAGE_TAG}

      - name: Tag app image
        run: docker tag mozilla/balrog:${IMAGE_TAG} ${GAR_LOCATION}-docker.pkg.dev/${GCP_PROJECT_ID}/${GAR_REPOSITORY}/balrog:${IMAGE_TAG}

      - name: Push app image
        run: docker push ${GAR_LOCATION}-docker.pkg.dev/${GCP_PROJECT_ID}/${GAR_REPOSITORY}/balrog:${IMAGE_TAG}
